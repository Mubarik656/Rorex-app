<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROREX - Remote Realistic Experience</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
        }
        .login-screen {
            background-color: rgba(31, 40, 51, 0.95);
            border: 2px solid var(--neon-blue);
            border-radius: 16px; padding: 40px;
            width: 100%; max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25);
            text-align: center; box-sizing: border-box;
        }
        .logo-big { font-size: 3rem; font-weight: bold; color: var(--neon-blue); letter-spacing: 5px; margin-bottom: 5px; }
        .subtitle { color: var(--neon-green); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 35px; text-transform: uppercase; }
        
        /* Absolut sicherer Button-Style */
        .btn-action {
            display: block !important;
            width: 100% !important;
            background-color: var(--neon-green) !important;
            color: #0b0c10 !important;
            border: none !important;
            padding: 15px !important;
            font-size: 1.2rem !important;
            font-weight: bold !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            box-shadow: 0 0 15px var(--neon-green);
        }
        
        .app-screen { display: none; width: 100%; min-height: 100vh; }
        .navbar { background-color: #1f2833; padding: 15px 5%; border-bottom: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 2rem; font-weight: bold; color: var(--neon-blue); }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: bold; text-transform: uppercase; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-green); }
        .page-section { padding: 40px 10%; display: none; }
        .page-section.active { display: block; }
        
        /* 360 Studio */
        .shop-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
        .shop-controls { background-color: var(--card-bg); padding: 30px; border-radius: 12px; border-left: 4px solid var(--neon-blue); }
        .studio-box { background-color: #11141a; border: 2px solid var(--neon-blue); border-radius: 12px; padding: 25px; text-align: center; }
        .car-display { background-color: #ffffff; width: 100%; height: 300px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: grab; }
        .interactive-car-svg { width: 85%; height: auto; }
        .car-part-path { fill: #e0e0e0; stroke: #222; stroke-width: 2; }
        .car-part-path.selected-part { stroke: var(--neon-blue) !important; stroke-width: 4px !important; }
        .color-palette { display: flex; gap: 10px; margin-top: 15px; }
        .color-node { width: 40px; height: 40px; border-radius: 6px; cursor: pointer; border: 2px solid #0b0c10; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="login-screen">
        <div class="logo-big">ROREX</div>
        <div class="subtitle">Remote Realistic Experience</div>
        <button class="btn-action" onclick="document.getElementById('login-screen').style.display='none'; document.getElementById('app-screen').style.display='block';">ANMELDEN</button>
    </div>

    <!-- HAUPTAPP -->
    <div id="app-screen" class="app-screen">
        <nav class="navbar">
            <div class="nav-logo">ROREX</div>
            <div class="nav-links">
                <a href="#" onclick="document.getElementById('page-halle').style.display='block'; document.getElementById('page-shop').style.display='none';">Halle</a>
                <a href="#" onclick="document.getElementById('page-halle').style.display='none'; document.getElementById('page-shop').style.display='block';">Shop (360°)</a>
            </div>
        </nav>

        <!-- HALLE -->
        <div id="page-halle" class="page-section" style="display: block;">
            <h2>DEINE ZONEN</h2>
            <p>Hier geht es bald zu den Live-Strecken!</p>
        </div>

        <!-- SHOP / 360 STUDIO -->
        <div id="page-shop" class="page-section">
            <h2>ROREX CUSTOM-STUDIO (360°)</h2>
            <div class="shop-layout">
                <div class="shop-controls">
                    <h3>1. Farbe wählen</h3>
                    <div class="color-palette">
                        <div class="color-node" style="background-color: #ff0000;" onclick="document.getElementById('svg-part-body').style.fill='#ff0000'"></div>
                        <div class="color-node" style="background-color: #00f0ff;" onclick="document.getElementById('svg-part-body').style.fill='#00f0ff'"></div>
                        <div class="color-node" style="background-color: #39ff14;" onclick="document.getElementById('svg-part-body').style.fill='#39ff14'"></div>
                        <div class="color-node" style="background-color: #ffcc00;" onclick="document.getElementById('svg-part-body').style.fill='#ffcc00'"></div>
                    </div>
                </div>

                <div class="studio-box">
                    <p style="color: var(--neon-blue); font-weight: bold;">↔️ Mit Maus ziehen zum Drehen ↔️</p>
                    <div id="car-display-area" class="car-display">
                        <svg class="interactive-car-svg" viewBox="0 0 400 200">
                            <g id="svg-rotation-group">
                                <path id="svg-part-body" class="car-part-path" d="M 50,110 L 350,110 L 330,60 L 250,50 L 150,50 L 80,70 Z" />
                                <circle cx="110" cy="110" r="25" fill="#111" />
                                <circle cx="290" cy="110" r="25" fill="#111" />
                            </g>
                        </svg>
                    </div>
                    <h3>Dein RC-Modell</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Das 360-Grad-Dreh-Skript direkt und fehlerfrei eingebaut
        const displayArea = document.getElementById('car-display-area');
        const rotationGroup = document.getElementById('svg-rotation-group');
        let isDragging = false;
        let previousX = 0;
        let currentRotation = 0;

        displayArea.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousX = e.clientX;
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        displayArea.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousX;
            previousX = e.clientX;
            currentRotation += deltaX * 0.8; 
            const scaleX = Math.cos(currentRotation * Math.PI / 180);
            rotationGroup.style.transform = scaleX(${scaleX});
            rotationGroup.style.transformOrigin = "200px 100px";
        });
    </script>
</body>
</html>
